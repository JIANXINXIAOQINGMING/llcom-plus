name: Build and Release

on:
  push:
    branches-ignore:
      - next
    tags:
      - '*'
  pull_request:
    branches-ignore:
      - next
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_PATH: llcom plus\llcom plus.csproj
      SOLUTION_PATH: llcom plus.sln
      RELEASE_ARTIFACT_DIR: artifacts\release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "${{ env.SOLUTION_PATH }}"

      - name: Clean release artifacts
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "${{ env.RELEASE_ARTIFACT_DIR }}" -ErrorAction SilentlyContinue

      - name: Build
        run: msbuild "${{ env.PROJECT_PATH }}" /p:Configuration=Release /p:Platform=x64 /v:normal

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llcom-plus-release-x64
          path: artifacts/release/*.zip
          if-no-files-found: error

      # -------- 以下步骤仅在打 tag 时执行 --------

      - name: Prepare release files
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path temp
          Copy-Item "${{ env.RELEASE_ARTIFACT_DIR }}\*.zip" temp\
          Copy-Item changlog\index.html temp\changelog.html
          Copy-Item changlog\autoUpdate.xml temp\autoUpdate.xml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: artifacts/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to COS
        if: startsWith(github.ref, 'refs/tags/')
        shell: cmd
        env:
          COS_A: ${{ secrets.COS_A }}
          COS_S: ${{ secrets.COS_S }}
          COS_B: ${{ secrets.COS_B }}
          COS_R: ${{ secrets.COS_R }}
        run: |
          python -m pip install coscmd==1.8.6.31
          coscmd config -a %COS_A% -s %COS_S% -b %COS_B% -r %COS_R%
          coscmd upload temp/ / -r
